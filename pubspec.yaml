name: akira
description: "Flutter based app to watch anime"
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  google_fonts: ^8.1.0
  flutter_widget_from_html: ^0.17.2
  dynamic_color: ^1.7.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.6
  pointycastle: ^4.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  share_plus: ^10.0.0
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5
  screen_brightness: ^2.1.11
  flutter_volume_controller: ^2.0.1
  webview_flutter: ^4.4.2
  flutter_local_notifications: ^17.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/akira.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/akira.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/akira.png
